name: Merge IPTV Lists
on:
  schedule:
    - cron: '*/5 * * * *' # Syncs every 5 minutes
  workflow_dispatch:      # Allows manual start

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v3

      - name: Merge Lists
        run: |
          # 1. Download friend's list to a temporary file
          curl -s "https://raw.githubusercontent.com/srhady/Fancode-bd/refs/heads/main/main_playlist.m3u" -o friends_list.m3u
          
          # 2. Keep only YOUR original channels (The script assumes they are already in the file)
          # We search for the first occurrence of your friend's data marker to avoid duplicates
          sed -i '/### FRIENDS CHANNELS START ###/,$d' "BDIX TV SANI"
          
          # 3. Add a marker and Append friend's content (minus his #EXTM3U header)
          echo -e "\n### FRIENDS CHANNELS START ###" >> "BDIX TV SANI"
          grep -v "#EXTM3U" friends_list.m3u >> "BDIX TV SANI"

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add "BDIX TV SANI"
          git commit -m "Merged latest updates: $(date)" || exit 0
          git push
          
